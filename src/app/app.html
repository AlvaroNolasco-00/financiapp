@if (userProfile$ | async; as user) {
  <main class="main-layout">
    <nav class="sidebar">
      <div class="logo">
        <div class="logo-icon"></div>
        <span>Financia</span>
      </div>

      <div class="nav-links">
        <a routerLink="/calculator" routerLinkActive="active" class="nav-item">
          <i class="icon"></i>
          Calculadora
        </a>
        <a routerLink="/investments" routerLinkActive="active" class="nav-item">
          <i class="icon"></i>
          Inversiones
        </a>
        <a routerLink="/compound" routerLinkActive="active" class="nav-item">
          <i class="icon"></i>
          Apalancamiento
        </a>
        <a routerLink="/ahorro-programado" routerLinkActive="active" class="nav-item">
          <i class="icon"></i>
          Ahorro Programado
        </a>
        <a routerLink="/salario" routerLinkActive="active" class="nav-item">
          <i class="icon"></i>
          Salario Neto
        </a>
        <a routerLink="/profile" routerLinkActive="active" class="nav-item">
          <i class="icon"></i>
          Perfil
        </a>
      </div>

      <div class="user-profile" routerLink="/profile">
        <div class="avatar">
          @if (user.photoURL) {
            <img [src]="user.photoURL" [alt]="user.fullName" style="width: 100%; height: 100%; border-radius: 50%;">
          } @else {
            {{ getInitials(user.fullName) }}
          }
        </div>
        <div class="user-info">
          <span class="user-name">{{ user.fullName }}</span>
          <span class="user-rank">Pro User</span>
        </div>
      </div>
    </nav>

    <div class="content-area">
      <header class="top-bar">
        <div class="search-bar">
          <input type="text" placeholder="Buscar herramientas...">
        </div>
        <div class="actions">
          <button class="btn-icon">🔔</button>
          <button class="btn-premium">Subir a Premium</button>
        </div>
      </header>

      <div class="router-wrap">
        <router-outlet></router-outlet>
      </div>
    </div>
  </main>
} @else {
  <router-outlet></router-outlet>
}
