<div class="auth-container">
  <div class="auth-card animate-fade-in">
    <div class="auth-header">
      <div class="logo">
        <div class="logo-icon"></div>
        <span>Financia</span>
      </div>
      <h1>Crea tu cuenta</h1>
      <p>Comienza a optimizar tus finanzas hoy</p>
    </div>

    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="auth-form">
      <div class="form-group">
        <label for="fullName">Nombre Completo</label>
        <div class="input-wrapper">
          <input type="text" id="fullName" formControlName="fullName" placeholder="Ej: Juan Pérez"
                 [class.error]="registerForm.get('fullName')?.invalid && registerForm.get('fullName')?.touched">
        </div>
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <div class="input-wrapper">
          <input type="email" id="email" formControlName="email" placeholder="nombre@ejemplo.com"
                 [class.error]="registerForm.get('email')?.invalid && registerForm.get('email')?.touched">
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="password">Contraseña</label>
          <div class="input-wrapper">
            <input type="password" id="password" formControlName="password" placeholder="••••••••"
                   [class.error]="registerForm.get('password')?.invalid && registerForm.get('password')?.touched">
          </div>
        </div>

        <div class="form-group">
          <label for="confirmPassword">Confirmar</label>
          <div class="input-wrapper">
            <input type="password" id="confirmPassword" formControlName="confirmPassword" placeholder="••••••••"
                   [class.error]="(registerForm.get('confirmPassword')?.invalid || registerForm.hasError('mismatch')) && registerForm.get('confirmPassword')?.touched">
          </div>
        </div>
      </div>

      @if (errorMsg()) {
        <div class="error-alert">
          {{ errorMsg() }}
        </div>
      }

      @if (registerForm.hasError('mismatch') && registerForm.get('confirmPassword')?.touched) {
        <div class="error-alert">
          Las contraseñas no coinciden.
        </div>
      }

      <button type="submit" class="btn-primary" [disabled]="registerForm.invalid || isLoading()">
        @if (isLoading()) {
          <span class="spinner"></span>
        } @else {
          Crear Cuenta
        }
      </button>

      <div class="divider">
        <span>o regístrate con</span>
      </div>

      <button type="button" class="btn-google" (click)="loginWithGoogle()" [disabled]="isLoading()">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/layout/google.svg" alt="Google">
        Google
      </button>
    </form>

    <div class="auth-footer">
      ¿Ya tienes una cuenta? <a routerLink="/login">Inicia sesión</a>
    </div>
  </div>
</div>
