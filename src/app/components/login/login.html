<div class="auth-container">
  <div class="auth-card animate-fade-in">
    <div class="auth-header">
      <div class="logo">
        <div class="logo-icon"></div>
        <span>Financia</span>
      </div>
      <h1>Bienvenido de nuevo</h1>
      <p>Inicia sesión para gestionar tus finanzas</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="auth-form">
      <div class="form-group">
        <label for="email">Email</label>
        <div class="input-wrapper">
          <input type="email" id="email" formControlName="email" placeholder="nombre@ejemplo.com"
                 [class.error]="loginForm.get('email')?.invalid && loginForm.get('email')?.touched">
        </div>
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <div class="input-wrapper">
          <input type="password" id="password" formControlName="password" placeholder="••••••••"
                 [class.error]="loginForm.get('password')?.invalid && loginForm.get('password')?.touched">
        </div>
      </div>

      @if (errorMsg()) {
        <div class="error-alert">
          {{ errorMsg() }}
        </div>
      }

      <button type="submit" class="btn-primary" [disabled]="loginForm.invalid || isLoading()">
        @if (isLoading()) {
          <span class="spinner"></span>
        } @else {
          Iniciar Sesión
        }
      </button>

      <div class="divider">
        <span>o continúa con</span>
      </div>

      <button type="button" class="btn-google" (click)="loginWithGoogle()" [disabled]="isLoading()">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/layout/google.svg" alt="Google">
        Google
      </button>
    </form>

    <div class="auth-footer">
      ¿No tienes una cuenta? <a routerLink="/register">Regístrate</a>
    </div>
  </div>
</div>
